<header class="bg-white/95 backdrop-blur border-b border-slate-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-full bg-primary flex items-center justify-center text-white font-serif font-bold text-xl shadow-sm">B</div>
      <div>
        <div class="font-serif text-lg md:text-xl font-bold text-primary leading-none">Bijnor Piles Centre</div>
        <div class="text-xs text-slate-500 mt-0.5">Proctology · Bijnor, UP</div>
      </div>
    </a>
    <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-slate-700">
      <a href="{{ '/' | relative_url }}" class="hover:text-primary transition">Home</a>
      <a href="{{ '/about/' | relative_url }}" class="hover:text-primary transition">About</a>
      <a href="{{ '/#treatments' | relative_url }}" class="hover:text-primary transition">Treatments</a>
      <a href="{{ '/blog/' | relative_url }}" class="hover:text-primary transition">Blog</a>
      <a href="{{ '/contact/' | relative_url }}" class="hover:text-primary transition">Contact</a>
    </nav>
    <a href="tel:{{ site.clinic.phone }}" class="hidden md:inline-flex items-center gap-2 bg-accent text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-accent-dark transition shadow-sm">
      📞 Book Now
    </a>
    <button id="menu-btn" class="md:hidden text-2xl text-primary" aria-label="Menu">☰</button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 px-4 py-3 space-y-1">
    <a href="{{ '/' | relative_url }}" class="block py-2 text-slate-700">Home</a>
    <a href="{{ '/about/' | relative_url }}" class="block py-2 text-slate-700">About</a>
    <a href="{{ '/#treatments' | relative_url }}" class="block py-2 text-slate-700">Treatments</a>
    <a href="{{ '/blog/' | relative_url }}" class="block py-2 text-slate-700">Blog</a>
    <a href="{{ '/contact/' | relative_url }}" class="block py-2 text-slate-700">Contact</a>
    <a href="tel:{{ site.clinic.phone }}" class="block mt-2 py-2.5 bg-accent text-white text-center rounded-lg font-semibold">📞 Book Now</a>
  </div>
  <script>
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
  </script>
</header>
