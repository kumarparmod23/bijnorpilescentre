<!doctype html>
<html lang="{{ page.lang | default: site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  {% seo %}
  <!-- Google Search Console verification — paste your code in _config.yml: google_site_verification: "YOUR_CODE" -->
  {% if site.google_site_verification %}
  <meta name="google-site-verification" content="{{ site.google_site_verification }}">
  {% endif %}
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="sitemap" type="application/xml" href="{{ '/sitemap.xml' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%230A4D68'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Georgia'%3EB%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0A4D68', dark: '#083B51', light: '#088395' },
            accent:  { DEFAULT: '#E76F51', dark: '#C85A3E' },
            cream:   '#FAF9F6',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; color: #1E293B; background: #FAF9F6; }
    h1,h2,h3,h4 { font-family: 'Playfair Display', Georgia, serif; }
    .prose { max-width: 100%; }
    .prose h1 { font-size: 2.25rem; color: #0A4D68; margin: 0 0 1rem; line-height: 1.2; }
    .prose h2 { font-size: 1.625rem; color: #0A4D68; margin: 2.25rem 0 1rem; }
    .prose h3 { font-size: 1.25rem; color: #0A4D68; margin: 1.75rem 0 0.5rem; }
    .prose p, .prose ul, .prose ol { margin-bottom: 1rem; line-height: 1.8; color: #334155; }
    .prose ul, .prose ol { padding-left: 1.5rem; }
    .prose ul { list-style: disc; }
    .prose ol { list-style: decimal; }
    .prose a { color: #0A4D68; text-decoration: underline; text-underline-offset: 2px; }
    .prose a:hover { color: #E76F51; }
    .prose strong { color: #0A4D68; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: 0.95rem; }
    .prose table th, .prose table td { border: 1px solid #e2e8f0; padding: 0.6rem 0.8rem; text-align: left; }
    .prose table th { background: #F1F5F9; color: #0A4D68; font-weight: 600; }
    .prose blockquote { border-left: 4px solid #E76F51; padding: 0.5rem 1rem; margin: 1.5rem 0; background: #FFF7F4; color: #475569; font-style: italic; }
    .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 40; text-decoration: none; font-size: 26px; }
    .whatsapp-float:hover { transform: scale(1.05); }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  {% include header.html %}
  <main class="flex-1">{{ content }}</main>
  {% include footer.html %}
  <a href="https://wa.me/{{ site.clinic.whatsapp }}" class="whatsapp-float" aria-label="WhatsApp us on +91 70177 90760">💬</a>
</body>
</html>
