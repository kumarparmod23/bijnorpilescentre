  country: India
  phone: "+91-XXXXXXXXXX"
  whatsapp: "+91-XXXXXXXXXX"
  treatments:
    - Kshar Sutra
    - Kshar Karma
    - Rubber Band Ligation
  conditions:
    - Piles
    - Fissure
    - Fistula
    - Pilonidal Sinus

exclude:
  - scripts/
  - README.md
  - requirements.txt
